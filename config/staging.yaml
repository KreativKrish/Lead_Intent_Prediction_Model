# Staging Environment Configuration

mlflow:
  experiment_name: "lead_intent_staging"
  model_stage: "Staging"

api:
  port: 8000
  workers: 2
  log_level: "info"
  cors_origins:
    - "https://staging.example.com"

training:
  test_size: 0.2
  cv_folds: 5
  model:
    xgboost:
      n_estimators: 100

evaluation:
  thresholds:
    min_roc_auc: 0.8
    min_f1: 0.75

data_validation:
  enabled: true

logging:
  level: "INFO"

monitoring:
  enabled: true
  metrics_port: 8001
